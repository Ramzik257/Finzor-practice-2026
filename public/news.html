<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новости — Портал команды</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="news">
  <div id="globalLoader" class="loader hidden"><div class="spinner"></div></div>
  <div id="toastWrap" class="toast-wrap"></div>
  <header class="card header container">
    <div class="brand"><span class="brand-mark">ПК</span><span>Портал команды</span></div>
    <nav class="nav">
      <a data-page="home" href="index.html">Главная</a>
      <a data-page="tasks" href="tasks.html">Задачи</a>
      <a data-page="news" href="news.html">Новости</a>
      <a data-page="admin" id="adminLink" href="admin.html">Админ</a>
    </nav>
    <div class="user-bar">
      <span><strong id="currentUserName">…</strong></span>
      <span id="currentUserRole">…</span>
      <button id="logoutBtn" type="button" class="btn secondary btn-sm">Выйти</button>
    </div>
  </header>
  <main class="page">
    <div class="container grid" style="grid-template-columns:repeat(auto-fit,minmax(320px,1fr));align-items:start">
      <section class="card section-card">
        <h2>Опубликовать новость</h2>
        <form id="newsForm" class="form-grid">
          <div>
            <label for="newsTitle">Заголовок</label>
            <input id="newsTitle" name="title" required>
          </div>
          <div>
            <label for="newsContent">Текст</label>
            <textarea id="newsContent" name="content" required></textarea>
          </div>
          <button type="submit">Опубликовать</button>
        </form>
      </section>
      <section id="newsList" class="grid"></section>
    </div>
  </main>
  <script type="module" src="assets/js/pages/news.js"></script>
</body>
</html>
