<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Портал команды</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div id="globalLoader" class="loader hidden"><div class="spinner"></div></div>
  <div id="toastWrap" class="toast-wrap"></div>
  <main class="login-wrap">
    <section class="card login-card">
      <div class="brand" style="margin-bottom:1rem">
        <span class="brand-mark">ПК</span>
        <span>Портал команды</span>
      </div>
      <h1>Вход</h1>
      <p class="muted subtitle">Корпоративный портал для совместной работы</p>
      <form id="loginForm" class="form-grid">
        <div>
          <label for="email">Электронная почта</label>
          <input id="email" name="email" type="email" placeholder="name@company.ru" required>
        </div>
        <div>
          <label for="password">Пароль</label>
          <input id="password" name="password" type="password" minlength="6" placeholder="Не менее 6 символов" required>
        </div>
        <p id="loginError" class="error-text"></p>
        <button type="submit">Войти</button>
      </form>
    </section>
  </main>
  <script type="module" src="assets/js/pages/login.js"></script>
</body>
</html>
