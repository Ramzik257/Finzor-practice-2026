<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Задачи — Портал команды</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="tasks">
  <div id="globalLoader" class="loader hidden"><div class="spinner"></div></div>
  <div id="toastWrap" class="toast-wrap"></div>
  <header class="card header container">
    <div class="brand"><span class="brand-mark">ПК</span><span>Портал команды</span></div>
    <nav class="nav">
      <a data-page="home" href="index.html">Главная</a>
      <a data-page="tasks" href="tasks.html">Задачи</a>
      <a data-page="news" href="news.html">Новости</a>
      <a data-page="admin" id="adminLink" href="admin.html">Админ</a>
    </nav>
    <div class="user-bar">
      <span><strong id="currentUserName">…</strong></span>
      <span id="currentUserRole">…</span>
      <button id="logoutBtn" type="button" class="btn secondary btn-sm">Выйти</button>
    </div>
  </header>
  <main class="page">
    <div class="container">
      <section class="card toolbar">
        <div>
          <label for="search">Поиск</label>
          <input id="search" name="search" form="filters" placeholder="Название или описание">
        </div>
        <form id="filters" class="toolbar" style="padding:0;margin:0;display:contents">
          <div>
            <label for="status">Статус</label>
            <select id="status" name="status">
              <option value="">Все</option>
              <option value="pending">Ожидает</option>
              <option value="in_progress">В работе</option>
              <option value="completed">Выполнена</option>
            </select>
          </div>
          <div>
            <label for="priority">Приоритет</label>
            <select id="priority" name="priority">
              <option value="">Все</option>
              <option value="low">Низкий</option>
              <option value="medium">Средний</option>
              <option value="high">Высокий</option>
            </select>
          </div>
          <div>
            <label for="assignee">Ответственный</label>
            <select id="assignee" name="assignee_id">
              <option value="">Все</option>
            </select>
          </div>
          <div>
            <label for="deadline">Срок</label>
            <input id="deadline" name="deadline" type="date">
          </div>
        </form>
        <div class="toolbar-actions">
          <button id="resetFilters" type="button" class="btn secondary">Сбросить</button>
          <button id="createTaskBtn" type="button">+ Новая задача</button>
        </div>
      </section>
      <section id="taskList" class="grid tasks"></section>
    </div>
  </main>

  <div id="taskModal" class="modal">
    <div class="card modal-box">
      <h2 id="modalTitle">Новая задача</h2>
      <form id="taskForm" class="form-grid">
        <input type="hidden" name="id">
        <div>
          <label for="title">Название</label>
          <input id="title" name="title" required>
        </div>
        <div>
          <label for="description">Описание</label>
          <textarea id="description" name="description"></textarea>
        </div>
        <div>
          <label for="assigneeInput">Ответственный</label>
          <select id="assigneeInput" name="assignee_id">
            <option value="">Не назначен</option>
          </select>
        </div>
        <div>
          <label for="deadlineInput">Крайний срок</label>
          <input id="deadlineInput" name="deadline" type="datetime-local">
        </div>
        <div>
          <label for="priorityInput">Приоритет</label>
          <select id="priorityInput" name="priority">
            <option value="low">Низкий</option>
            <option value="medium" selected>Средний</option>
            <option value="high">Высокий</option>
          </select>
        </div>
        <div>
          <label for="statusInput">Статус</label>
          <select id="statusInput" name="status">
            <option value="pending">Ожидает</option>
            <option value="in_progress">В работе</option>
            <option value="completed">Выполнена</option>
          </select>
        </div>
        <div class="toolbar-actions">
          <button type="submit">Сохранить</button>
          <button type="button" id="closeModal" class="btn secondary">Отмена</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="assets/js/pages/tasks.js"></script>
</body>
</html>
