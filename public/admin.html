<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель — Портал команды</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="admin">
  <div id="globalLoader" class="loader hidden"><div class="spinner"></div></div>
  <div id="toastWrap" class="toast-wrap"></div>
  <header class="card header container">
    <div class="brand"><span class="brand-mark">ПК</span><span>Портал команды</span></div>
    <nav class="nav">
      <a data-page="home" href="index.html">Главная</a>
      <a data-page="tasks" href="tasks.html">Задачи</a>
      <a data-page="news" href="news.html">Новости</a>
      <a data-page="admin" id="adminLink" href="admin.html">Админ</a>
    </nav>
    <div class="user-bar">
      <span><strong id="currentUserName">…</strong></span>
      <span id="currentUserRole">…</span>
      <button id="logoutBtn" type="button" class="btn secondary btn-sm">Выйти</button>
    </div>
  </header>
  <main class="page">
    <div class="container grid">
      <section class="card section-card">
        <h2>Новый пользователь</h2>
        <form id="createUserForm" class="form-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
          <div>
            <label for="userEmail">Почта</label>
            <input id="userEmail" name="email" type="email" required>
          </div>
          <div>
            <label for="userPassword">Пароль</label>
            <input id="userPassword" name="password" type="password" minlength="6" required>
          </div>
          <div>
            <label for="userName">Имя</label>
            <input id="userName" name="full_name" placeholder="Фамилия Имя">
          </div>
          <div>
            <label for="userRole">Роль</label>
            <select id="userRole" name="role">
              <option value="employee">Сотрудник</option>
              <option value="admin">Администратор</option>
            </select>
          </div>
          <div style="align-self:end">
            <button type="submit">Создать</button>
          </div>
        </form>
      </section>
      <section class="card section-card table-wrap">
        <h2>Пользователи</h2>
        <table>
          <thead>
            <tr>
              <th>№</th>
              <th>Почта</th>
              <th>Имя</th>
              <th>Роль</th>
              <th>Статус</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </section>
    </div>
  </main>
  <script type="module" src="assets/js/pages/admin.js"></script>
</body>
</html>
